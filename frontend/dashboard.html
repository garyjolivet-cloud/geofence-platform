<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geofence Platform — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --night:#0a1018;--slate:#141d2b;--slate2:#1b2738;--rim:#26344a;--coral:#ff6a3d;
         --snow:#eef4fb;--ice:#8fb6d4;--fog:#5b7088;--hazard:#ff2f4e;--go:#38e0a6;--amber:#ffc24d; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--night);color:var(--snow);font-family:"Barlow",system-ui,sans-serif}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 70px}
  header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
         padding:10px 0 18px;border-bottom:1px solid var(--rim);margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:11px}
  .glyph{width:36px;height:36px;border-radius:10px;background:linear-gradient(150deg,var(--coral),#ff9166);position:relative}
  .glyph::after{content:"";position:absolute;inset:10px;border-radius:50%;border:2px solid #1a0d07}
  .brand h1{font-family:"Black Han Sans";font-weight:400;font-size:19px;margin:0}
  .brand p{margin:0;font-family:"Barlow Condensed";font-size:11.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--fog)}
  nav{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  select,input,button{font-family:"Barlow Condensed";font-size:14px}
  select,.tokenin{background:var(--slate);border:1px solid var(--rim);color:var(--snow);border-radius:9px;padding:8px 11px}
  nav a,button.nav{font-family:"Barlow Condensed";font-weight:600;font-size:13px;letter-spacing:.4px;text-transform:uppercase;
        padding:8px 12px;border:1px solid var(--rim);border-radius:9px;color:var(--ice);background:rgba(20,29,43,.5);cursor:pointer}
  nav a:hover,button.nav:hover{border-color:var(--coral);color:var(--snow)}
  button.go{background:var(--coral);border:none;color:#1a0d07;font-weight:700;border-radius:9px;padding:9px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.4px}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:26px}
  .stat{background:linear-gradient(180deg,var(--slate),#10192680);border:1px solid var(--rim);border-radius:14px;padding:14px 15px}
  .stat .n{font-family:"Barlow Condensed";font-weight:700;font-size:30px;line-height:1}
  .stat .l{font-family:"Barlow Condensed";font-size:12px;letter-spacing:.7px;text-transform:uppercase;color:var(--fog);margin-top:4px}

  section{margin-bottom:30px}
  h2{font-family:"Barlow Condensed";font-weight:700;font-size:16px;letter-spacing:1.2px;text-transform:uppercase;
     color:var(--ice);margin:0 0 3px}
  .hint{color:var(--fog);font-size:13.5px;margin:0 0 14px;max-width:760px;line-height:1.45}
  .panel{background:linear-gradient(180deg,var(--slate),#10192640);border:1px solid var(--rim);border-radius:14px;padding:16px 16px 8px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-family:"Barlow Condensed";font-weight:600;font-size:12px;letter-spacing:.6px;text-transform:uppercase;
     color:var(--fog);padding:6px 8px;border-bottom:1px solid var(--rim)}
  td{padding:8px 8px;border-bottom:1px solid #1a2433}
  td{border-bottom:1px solid #1a2433}
  tr:last-child td{border-bottom:none}
  .bar{height:9px;border-radius:5px;background:var(--coral);min-width:2px}
  .bar.dim{background:var(--fog)} .bar.warn{background:var(--amber)} .bar.bad{background:var(--hazard)} .bar.good{background:var(--go)}
  .tag{font-family:"Barlow Condensed";font-size:11px;font-weight:600;padding:2px 7px;border-radius:11px;text-transform:uppercase;letter-spacing:.4px}
  .tag.bad{color:var(--hazard);border:1px solid rgba(255,47,78,.5);background:rgba(255,47,78,.09)}
  .tag.ok{color:var(--go);border:1px solid rgba(56,224,166,.45);background:rgba(56,224,166,.09)}
  .state{border:1px dashed var(--rim);border-radius:14px;padding:30px;text-align:center;color:var(--fog);font-family:"Barlow Condensed";font-size:15px}
  .state b{color:var(--snow)} .state a{color:var(--coral);font-weight:600}
  .note{color:var(--fog);font-size:12.5px;font-style:italic;margin:8px 2px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="glyph"></div>
      <div><h1>Analytics</h1><p>Geofence Platform · Back office</p></div>
    </div>
    <nav>
      <select id="projSel"><option value="">— project —</option></select>
      <input class="tokenin" id="tok" type="password" placeholder="admin token" style="width:140px">
      <button class="go" id="load">Load</button>
      <a href="/">Home</a>
    </nav>
  </header>

  <div id="body">
    <div class="state" id="state">Pick a project, enter your admin token, and Load to see analytics.</div>
  </div>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const state=$("state"), body=$("body");
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function tok(){ return $("tok").value || sessionStorage.getItem("gp.admin") || ""; }

async function loadProjects(){
  try{ const r=await fetch("/api/projects"); const j=await r.json();
    const sel=$("projSel"); (j.projects||[]).forEach(p=>{ const o=document.createElement("option");
      o.value=p.id; o.textContent=p.name; sel.appendChild(o); });
  }catch(e){}
}
function parseEvents(rows){
  return rows.map(r=>{ let d={}; try{ d=JSON.parse(r.data||"{}"); }catch(e){} return {type:r.type, ts:r.ts, deviceId:r.deviceId, d}; });
}
function bar(pct,cls){ return '<div class="bar '+(cls||'')+'" style="width:'+Math.max(2,Math.round(pct*100))+'%"></div>'; }

function render(events){
  if(!events.length){ state.style.display="block";
    state.innerHTML='No analytics yet for this project. Walk the tour in the engine with <b>Anonymous usage</b> turned on, then reload.'; 
    body.querySelectorAll("section,.cards").forEach(n=>n.remove()); return; }
  state.style.display="none";

  const spatial=events.filter(e=>e.type==="SPATIAL_TRANSITION");
  const audio=events.filter(e=>e.type==="AUDIO_ENGAGEMENT");
  const devices=new Set(events.map(e=>e.deviceId)).size;
  const tmin=Math.min(...events.map(e=>e.ts)), tmax=Math.max(...events.map(e=>e.ts));
  const span=tmax>tmin?((tmax-tmin)/3600000).toFixed(1)+" h":"—";

  // ---- per-zone aggregates ----
  const zones={};
  function zrec(z){ return zones[z]||(zones[z]={enter:0,exit:0,deliv:0,lat:[],accAll:[],accPoor:0,worst:0,flips:0,_last:{}}); }
  // flips = a transition that follows the previous transition for the same zone+device within 30 s
  const spatialAsc=spatial.slice().sort((a,b)=>a.ts-b.ts);
  spatialAsc.forEach(e=>{ const z=e.d.zone_id||"?"; const r=zrec(z); const dev=e.deviceId||"?";
    if(e.d.state==="ENTER") r.enter++; else if(e.d.state==="EXIT") r.exit++;
    if(r._last[dev]!=null && (e.ts-r._last[dev])<30000) r.flips++;
    r._last[dev]=e.ts;
    if(e.d.accuracy_m!=null){ r.accAll.push(e.d.accuracy_m); if(e.d.accuracy_m>15){ r.accPoor++; r.worst=Math.max(r.worst,e.d.accuracy_m);} } });
  audio.forEach(e=>{ const z=e.d.zone_id||"?"; const r=zrec(z); r.deliv++;
    if(e.d.trigger_latency_ms!=null) r.lat.push(e.d.trigger_latency_ms); });
  const zlist=Object.keys(zones);

  // ---- overview cards ----
  let html='<div class="cards">'
    +stat(events.length,"events")
    +stat(spatial.length,"transitions")
    +stat(audio.length,"audio fires")
    +stat(devices,"devices")
    +stat(span,"time span")
    +'</div>';

  // ---- View A: straddle / flicker ----
  const maxFlip=Math.max(1,...zlist.map(z=>zones[z].flips),1);
  html+='<section><h2>A · Fence stability</h2>'
    +'<p class="hint">A <b>flip</b> is an enter/exit on the same fence within 30 seconds — the GPS-drift bounce from engine §4a. Several flips on one stop means the boundary is too tight or sits on a hard edge; widen its exit buffer or move it. Clean stops show entries ≈ exits and zero flips.</p>'
    +'<div class="panel"><table><tr><th>Stop</th><th>Enters</th><th>Exits</th><th>Flips&lt;30s</th><th style="width:30%">Bounce</th><th>Read</th></tr>';
  zlist.sort((a,b)=>zones[b].flips-zones[a].flips||zones[b].exit-zones[a].exit).forEach(z=>{ const r=zones[z];
    const bouncing=r.flips>=2;
    html+='<tr><td>'+esc(z)+'</td><td>'+r.enter+'</td><td>'+r.exit+'</td><td>'+r.flips+'</td>'
      +'<td>'+bar(r.flips/maxFlip, bouncing?'bad':'dim')+'</td>'
      +'<td>'+(bouncing?'<span class="tag bad">bouncing</span>':'<span class="tag ok">stable</span>')+'</td></tr>'; });
  html+='</table></div>'
    +'<p class="note">Geographic straddle-heatmap (paths over fences) arrives with recorded-route consent — kept out of anonymous analytics on purpose.</p></section>';

  // ---- View B: audio ----
  html+='<section><h2>B · Audio delivery</h2>'
    +'<p class="hint">Each reveal that fired, and how long from entering the stop to the audio starting (<b>trigger latency</b>). Long latency means the reveal ring is set too deep inside the fence. Completion curves arrive with the audio layer.</p>';
  if(audio.length){
    const maxLat=Math.max(1,...zlist.map(z=>avg(zones[z].lat)||0));
    html+='<div class="panel"><table><tr><th>Stop</th><th>Deliveries</th><th>Avg latency</th><th style="width:40%"></th></tr>';
    zlist.filter(z=>zones[z].deliv).sort((a,b)=>(avg(zones[b].lat)||0)-(avg(zones[a].lat)||0)).forEach(z=>{ const r=zones[z];
      const a=avg(r.lat); html+='<tr><td>'+esc(z)+'</td><td>'+r.deliv+'</td><td>'+(a!=null?(a/1000).toFixed(1)+' s':'—')+'</td>'
        +'<td>'+bar((a||0)/maxLat, (a>4000)?'warn':'good')+'</td></tr>'; });
    html+='</table></div>';
  } else html+='<div class="state">No audio fires recorded yet.</div>';
  html+='</section>';

  // ---- View C: signal quality ----
  const allAcc=spatial.map(e=>e.d.accuracy_m).filter(a=>a!=null);
  const buckets=[[0,5],[5,10],[10,15],[15,25],[25,999]]; const bc=buckets.map(()=>0);
  allAcc.forEach(a=>{ for(let i=0;i<buckets.length;i++){ if(a>=buckets[i][0]&&a<buckets[i][1]){bc[i]++;break;} } });
  const bmax=Math.max(1,...bc);
  html+='<section><h2>C · Signal quality</h2>'
    +'<p class="hint">GPS accuracy at the moment each fence fired. Fires above ~15 m happened on a loose fix — the trigger may be firing in the wrong place. These are the stops to move out from under tree cover or canyon walls.</p>'
    +'<div class="panel"><table>';
  buckets.forEach((b,i)=>{ const lbl=b[1]>900?(b[0]+"+ m"):(b[0]+"–"+b[1]+" m");
    const cls=i<2?'good':i<3?'warn':'bad';
    html+='<tr><td style="width:80px">'+lbl+'</td><td style="width:60px">'+bc[i]+'</td><td>'+bar(bc[i]/bmax,cls)+'</td></tr>'; });
  html+='</table></div>';
  const poor=zlist.filter(z=>zones[z].accPoor>0).sort((a,b)=>zones[b].accPoor-zones[a].accPoor);
  if(poor.length){ html+='<div class="panel" style="margin-top:12px"><table><tr><th>Stop</th><th>Loose-fix fires</th><th>Worst fix</th><th>Suggestion</th></tr>';
    poor.forEach(z=>{ const r=zones[z];
      html+='<tr><td>'+esc(z)+'</td><td>'+r.accPoor+'</td><td>'+r.worst.toFixed(0)+' m</td>'
        +'<td style="color:var(--ice);font-size:13px">fired '+r.accPoor+'× on a fix worse than 15 m — move the trigger into the open or widen the ring</td></tr>'; });
    html+='</table></div>'; }
  html+='</section>';

  body.querySelectorAll("section,.cards").forEach(n=>n.remove());
  body.insertAdjacentHTML("beforeend", html);
}
function stat(n,l){ return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
function avg(a){ return a&&a.length?a.reduce((s,x)=>s+x,0)/a.length:null; }

async function load(){
  const pid=$("projSel").value; const t=$("tok").value;
  if(!pid){ state.style.display="block"; state.textContent="Pick a project first."; return; }
  if(t) sessionStorage.setItem("gp.admin", t);
  const useTok=tok();
  if(!useTok){ state.style.display="block"; state.textContent="Enter your admin token."; return; }
  state.style.display="block"; state.textContent="Loading analytics…";
  body.querySelectorAll("section,.cards").forEach(n=>n.remove());
  try{
    const r=await fetch("/api/analytics?project="+encodeURIComponent(pid)+"&limit=10000",
      { headers:{ authorization:"Bearer "+useTok } });
    if(r.status===401){ state.textContent="Unauthorized — check the admin token."; sessionStorage.removeItem("gp.admin"); return; }
    if(!r.ok){ state.textContent="Couldn't load analytics (HTTP "+r.status+")."; return; }
    const j=await r.json();
    render(parseEvents(j.events||[]));
  }catch(e){ state.textContent="Load failed: "+e.message; }
}
$("load").onclick=load;
$("tok").addEventListener("keydown",e=>{ if(e.key==="Enter") load(); });
loadProjects();
if(sessionStorage.getItem("gp.admin")) $("tok").placeholder="admin token (saved)";
</script>
</body>
</html>
